<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hee Hees</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424;
  --border: #333; --text: #f0f0f0; --muted: #888;
  --tab-h: clamp(56px, 8vw, 68px);
  --hdr-h: clamp(48px, 7vw, 62px);
  font-size: clamp(14px, 2.2vw, 18px);
}
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 1rem; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }

/* Header */
#hdr { height: var(--hdr-h); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 1rem; flex-shrink: 0; }
#hdr h1 { font-size: 1.1rem; font-weight: 700; }
#week-badge { font-size: 0.75rem; color: var(--muted); background: var(--surface2); padding: 0.2rem 0.6rem; border-radius: 10px; }
#sync-dot { font-size: 0.75rem; padding: 0.15rem 0.5rem; border-radius: 8px; }
.s-ok  { background: rgba(34,197,94,.2);  color: #22c55e; }
.s-sav { background: rgba(245,158,11,.2); color: #F59E0B; }
.s-err { background: rgba(239,68,68,.2);  color: #ef4444; }

/* Tab content */
#content { flex: 1; overflow-y: auto; }
.pane { display: none; padding: 0.75rem; }
.pane.on { display: block; }

/* Tab bar */
#tabs { height: var(--tab-h); background: var(--surface); border-top: 1px solid var(--border); display: flex; flex-shrink: 0; }
.tb { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; background: none; border: none; color: var(--muted); font-size: 0.65rem; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.tb.on { color: #fff; }
.tb svg { width: clamp(18px, 2.5vw, 24px); height: clamp(18px, 2.5vw, 24px); }

/* Buttons */
.btn { display: inline-flex; align-items: center; justify-content: center; padding: 0.65rem 1rem; border-radius: 8px; border: none; font-size: 0.9rem; font-weight: 600; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.bp { background: #3B82F6; color: #fff; }
.bs { background: #22c55e; color: #fff; }
.bg { background: var(--surface2); color: var(--text); }
.bd { background: #ef4444; color: #fff; }
.bw { width: 100%; }

/* Card */
.card { background: var(--surface); border-radius: 10px; border: 1px solid var(--border); margin-bottom: 0.75rem; overflow: hidden; }
.ch { padding: 0.6rem 0.9rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; font-weight: 700; }
.cb { padding: 0.75rem; }

/* Toggle */
.tgl { position: relative; width: clamp(40px,6vw,50px); height: clamp(24px,3.5vw,30px); flex-shrink: 0; }
.tgl input { opacity: 0; width: 0; height: 0; position: absolute; }
.tgl-tr { position: absolute; inset: 0; background: var(--border); border-radius: 15px; cursor: pointer; transition: background .2s; }
.tgl input:checked + .tgl-tr { background: #3B82F6; }
.tgl-th { position: absolute; width: clamp(18px,2.6vw,22px); height: clamp(18px,2.6vw,22px); background: #fff; border-radius: 50%; top: 3px; left: 3px; pointer-events: none; transition: transform .2s; }
.tgl input:checked ~ .tgl-th { transform: translateX(clamp(16px,2.2vw,20px)); }

/* Modal */
.mbd { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; align-items: flex-end; }
.mbd.on { display: flex; }
.msh { background: var(--surface); border-radius: 16px 16px 0 0; width: 100%; max-height: 88dvh; overflow-y: auto; padding: 1rem 1rem 1.5rem; border-top: 1px solid var(--border); }
.mhd { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 1rem; }
.mttl { font-size: 1rem; font-weight: 700; margin-bottom: 1rem; }
.msec { font-size: 0.7rem; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin: 1rem 0 0.5rem; }

/* Infraction rows */
.ir { display: flex; align-items: center; padding: 0.65rem 0; border-bottom: 1px solid var(--border); gap: 0.65rem; }
.ir:last-child { border-bottom: none; }
.irn { font-weight: 500; }
.irf { font-size: 0.75rem; color: var(--muted); }
.badge { font-size: 0.65rem; padding: 1px 5px; border-radius: 4px; font-weight: 600; }
.bp2 { background: rgba(59,130,246,.2); color: #60A5FA; }
.ba  { background: rgba(245,158,11,.2); color: #F59E0B; }

/* Hanging counter */
.hctr { display: flex; align-items: center; gap: 1rem; padding: 0.65rem 0; }
.hbtn { width: clamp(40px,7vw,52px); height: clamp(40px,7vw,52px); border-radius: 50%; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 1.4rem; display: flex; align-items: center; justify-content: center; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.hnum { font-size: 1.6rem; font-weight: 700; min-width: 2rem; text-align: center; }

/* Live tab */
.game-sel { display: flex; gap: 0.4rem; margin-bottom: 0.75rem; }
.gbtn { flex: 1; padding: 0.5rem; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); font-weight: 600; font-size: 0.9rem; cursor: pointer; text-align: center; -webkit-tap-highlight-color: transparent; }
.gbtn.on { background: #3B82F6; border-color: #3B82F6; color: #fff; }

.bsec { margin-bottom: 0.65rem; }
.bhdr { display: flex; align-items: center; padding: 0.5rem 0.65rem; border-radius: 8px 8px 0 0; border: 1px solid var(--border); border-bottom: none; gap: 0.5rem; }
.bname { font-weight: 700; font-size: 0.9rem; flex: 1; }
.hbadge { display: flex; align-items: center; gap: 4px; padding: 0.15rem 0.5rem; border-radius: 10px; background: var(--surface2); cursor: pointer; font-size: 0.75rem; }
.hbadge.lit { background: rgba(239,68,68,.2); color: #ef4444; }

.fgrid { display: grid; grid-template-columns: repeat(5,1fr); gap: 3px; padding: 0.4rem; background: var(--surface); border: 1px solid var(--border); border-radius: 0 0 8px 8px; }
.fcell { aspect-ratio: 1; border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; background: var(--surface2); border: 1px solid var(--border); min-height: clamp(40px,10vw,56px); -webkit-tap-highlight-color: transparent; overflow: hidden; padding: 2px; }
.fcell.abs { opacity: .3; cursor: default; }
.fcell.fi  { background: rgba(249,115,22,.2); border-color: #F97316; }
.fnum { font-size: clamp(7px,1.2vw,10px); color: var(--muted); position: absolute; top: 2px; left: 3px; }
.fchips { display: flex; flex-wrap: wrap; gap: 1px; justify-content: center; margin-top: 8px; }
.fchip { font-size: clamp(9px,1.8vw,13px); padding: 1px 4px; border-radius: 3px; font-weight: 700; line-height: 1.3; }
.fcp { background: rgba(245,158,11,.3); color: #F59E0B; }
.fct { background: rgba(59,130,246,.3); color: #60A5FA; }

/* Start-week bowler row */
.swrow { display: flex; align-items: center; padding: 0.7rem 0; border-bottom: 1px solid var(--border); gap: 0.65rem; }
.swrow:last-child { border-bottom: none; }
.avginp { width: 4rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 0.3rem 0.4rem; color: var(--text); font-size: 0.9rem; text-align: center; }

/* Inputs */
textarea, input[type=text], input[type=url], input[type=number] {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
  padding: 0.55rem 0.7rem; color: var(--text); font-size: 0.9rem; font-family: inherit;
}
textarea { width: 100%; resize: vertical; }
input[type=url], input[type=text] { width: 100%; }
textarea:focus, input:focus { outline: none; border-color: #3B82F6; }

/* Night/history */
.feerow { display: flex; align-items: center; padding: 0.7rem 0; border-bottom: 1px solid var(--border); gap: 0.5rem; }
.feerow:last-child { border-bottom: none; }
.famount { font-size: 1.1rem; font-weight: 700; margin-left: auto; }

/* Verify table */
.vtbl { width: 100%; border-collapse: collapse; font-size: 0.75rem; margin-top: 0.5rem; }
.vtbl th { text-align: left; padding: 0.3rem 0.45rem; border-bottom: 1px solid var(--border); color: var(--muted); font-weight: 600; }
.vtbl td { padding: 0.3rem 0.45rem; border-bottom: 1px solid var(--border); }
.ok  { color: #22c55e; }
.bad { color: #ef4444; font-weight: 700; }
.flg { color: #F59E0B; font-weight: 700; }

/* Admin */
.arow { display: flex; align-items: center; padding: 0.65rem 0; border-bottom: 1px solid var(--border); gap: 0.5rem; }
.arow:last-child { border-bottom: none; }
.ainp { width: 4.5rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 0.3rem 0.4rem; color: var(--text); font-size: 0.9rem; text-align: center; }

/* Dot */
.dot { display: inline-block; width: clamp(8px,1.5vw,12px); height: clamp(8px,1.5vw,12px); border-radius: 50%; flex-shrink: 0; }

/* Util */
.mt8  { margin-top: 0.5rem; }
.mt12 { margin-top: 0.75rem; }
.mt16 { margin-top: 1rem; }
.sm   { font-size: 0.75rem; color: var(--muted); }
</style>
</head>
<body>

<div id="hdr">
  <h1>🎳 Hee Hees</h1>
  <div style="display:flex;align-items:center;gap:8px">
    <span id="week-badge">—</span>
    <span id="sync-dot" class="s-ok">✓</span>
  </div>
</div>

<div id="content">

  <!-- LIVE -->
  <div id="pane-live" class="pane on">
    <div id="edit-banner" style="display:none;background:rgba(245,158,11,.15);border:1px solid #F59E0B;border-radius:8px;padding:8px 12px;margin-bottom:10px;display:none;align-items:center;gap:10px">
      <span style="flex:1;font-weight:600;color:#F59E0B">✏️ Editing Week <span id="edit-wn-label"></span></span>
      <button class="btn" style="background:#F59E0B;color:#000;padding:6px 14px;font-size:0.85rem" onclick="doneEditing()">Done</button>
    </div>
    <button id="swbtn" class="btn bp bw" style="margin-bottom:12px">Start Week 1</button>
    <div class="game-sel">
      <div class="gbtn on" data-g="0">Game 1</div>
      <div class="gbtn" data-g="1">Game 2</div>
      <div class="gbtn" data-g="2">Game 3</div>
    </div>
    <div id="bgrid"></div>
  </div>

  <!-- VERIFY -->
  <div id="pane-verify" class="pane">
    <div class="card">
      <div class="ch">Score Verification</div>
      <div class="cb">
        <div class="sm" style="margin-bottom:6px">Paste the score URL from your email</div>
        <input type="url" id="vurl" placeholder="https://..." />
        <button class="btn bp bw mt8" id="verify-btn" onclick="fetchAndVerify()">Fetch &amp; Verify</button>
        <div id="verify-status" class="sm mt8"></div>
      </div>
    </div>
    <div id="verify-results" style="margin-top:12px"></div>
  </div>

  <!-- NIGHT -->
  <div id="pane-night" class="pane">
    <div class="card">
      <div class="ch">Tonight's Summary</div>
      <div id="nsum" class="cb"></div>
    </div>
    <button id="cwbtn" class="btn bs bw mt12" style="display:none">Close Week</button>
  </div>

  <!-- HISTORY -->
  <div id="pane-history" class="pane">
    <div class="card">
      <div class="ch">Season Totals</div>
      <div id="stots" class="cb"></div>
    </div>
    <div class="card mt12">
      <div class="ch">Week Log</div>
      <div id="wlog" class="cb"></div>
    </div>
  </div>

  <!-- ADMIN -->
  <div id="pane-admin" class="pane">
    <div class="card">
      <div class="ch">Season</div>
      <div class="cb">
        <div class="arow">
          <span style="flex:1">Season Name</span>
          <input type="text" id="adm-season" style="width:90px;padding:5px 8px" />
        </div>
      </div>
    </div>
    <div class="card mt12">
      <div class="ch">Bowler Starting Averages</div>
      <div id="adm-bowlers" class="cb"></div>
    </div>
    <div class="card mt12">
      <div class="ch">Infraction Fees</div>
      <div id="adm-infs" class="cb"></div>

      <button class="btn bd bw" onclick="resetSeason()">Reset Season Data</button>
    </div>
  </div>

</div>

<!-- TAB BAR -->
<div id="tabs">
  <button class="tb on" data-t="live" onclick="tab('live',this)">

  </button>
  <button class="tb" data-t="verify" onclick="tab('verify',this)">

  </button>
  <button class="tb" data-t="night" onclick="tab('night',this)">

  </button>
  <button class="tb" data-t="history" onclick="tab('history',this)">

  </button>
  <button class="tb" data-t="admin" onclick="adminTab(this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a6 6 0 0112 0v2"/></svg>Admin
  </button>
</div>

<!-- START WEEK MODAL -->
<div id="m-sw" class="mbd">
  <div class="msh">
    <div class="mhd"></div>
    <div class="mttl">Start Week <span id="sw-wn"></span></div>
    <div id="sw-list"></div>
    <div style="display:flex;gap:8px;margin-top:16px">
      <button class="btn bg" style="flex:1" onclick="closeM('m-sw')">Cancel</button>
      <button class="btn bp" style="flex:2" onclick="confirmSW()">Start Week →</button>

  </div>
</div>

<!-- FRAME MODAL -->
<div id="m-frame" class="mbd">
  <div class="msh">
    <div class="mhd"></div>
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <button class="btn" style="flex:1;background:#F59E0B;color:#000" onclick="closeM('m-frame')">Cancel</button>
      <button class="btn bp" style="flex:2" onclick="saveFrame()">Save</button>
    </div>
    <div class="mttl" id="fm-title"></div>
    <div class="msec">Hangings</div>
    <div class="hctr">
      <button class="hbtn" onclick="adjHang(-1)">−</button>

      <button class="hbtn" onclick="adjHang(1)">+</button>
      <div class="sm" id="hfee" style="margin-left:4px"></div>
    </div>
    <div class="msec">Infractions</div>
    <div id="fm-infs"></div>
  </div>
</div>

<!-- PIN MODAL -->

    <div class="mttl">Admin PIN</div>

      <button class="pkb" onclick="pinKey('2')">2</button>
      <button class="pkb" onclick="pinKey('3')">3</button>
      <button class="pkb" onclick="pinKey('4')">4</button>
      <button class="pkb" onclick="pinKey('5')">5</button>
      <button class="pkb" onclick="pinKey('6')">6</button>
      <button class="pkb" onclick="pinKey('7')">7</button>
      <button class="pkb" onclick="pinKey('8')">8</button>
      <button class="pkb" onclick="pinKey('9')">9</button>
      <button class="pkb" onclick="pinKey('clear')" style="background:var(--surface2);font-size:0.75rem">CLR</button>
      <button class="pkb" onclick="pinKey('0')">0</button>
      <button class="pkb" onclick="pinKey('back')" style="background:var(--surface2)">⌫</button>
    </div>
    <button class="btn bg bw" style="margin-top:20px" onclick="closeM('m-pin')">Cancel</button>
  </div>
</div>

  if (inf.id === 'over10pin' && S.currentWeek !== 36) return false;
  if (inf.onlyFor    && !inf.onlyFor.includes(bid))    return false;
  if (inf.excludeFor &&  inf.excludeFor.includes(bid)) return false;
  return true;
}

function feesFor(bid, wn) {
  const w = gw(wn); if (!w) return 0;
  let t = 0;
  if (w.absent?.includes(bid)) t += 10;
  for (let g = 0; g < 3; g++) {
    const bg = w.games?.[g]?.[bid];
    if (!bg) continue;
    for (let f = 0; f < 10; f++)
      for (const iid of (bg.frames?.[f] || [])) {
        const inf = gi(iid);
        if (inf?.type === 'player') t += inf.fee;
      }
  }
  // team infractions from others
  for (const oid of (w.participating || [])) {
    if (oid === bid) continue;
    for (let g = 0; g < 3; g++) {
      const og = w.games?.[g]?.[oid];
      if (!og) continue;
      for (let f = 0; f < 10; f++)
        for (const iid of (og.frames?.[f] || [])) {
          const inf = gi(iid);
          if (inf?.type === 'team') t += inf.fee;
        }
    }
  }
  t += hangVal(w.hangings?.[bid] || 0);
  return t;
}

function seasonTotals() {
  const out = {};
  S.bowlers.forEach(b => { out[b.id] = 0; });
  Object.keys(S.weeks).forEach(wn => S.bowlers.forEach(b => { out[b.id] += feesFor(b.id, +wn); }));
  return out;
}

function syncDot(s) {
  const el = $('sync-dot');
  el.className = s === 'ok' ? 's-ok' : s === 'sav' ? 's-sav' : 's-err';
  el.textContent = s === 'ok' ? '✓' : s === 'sav' ? '↑' : '!';
}

async function loadState() {
  syncDot('sav');
  try {
    const { data, error } = await sb.from('hee_hees_state').select('state').eq('id', ROW_ID).single();
    if (error && error.code !== 'PGRST116') throw error;
    if (data?.state) S = data.state;
    syncDot('ok');
  } catch(e) { console.error(e); syncDot('err'); }
  render();
}

async function pushState() {
  saving = true; syncDot('sav');
  try {
    const { error } = await sb.from('hee_hees_state').upsert({ id: ROW_ID, state: S, updated_at: new Date().toISOString() });
    if (error) throw error;
    syncDot('ok');
  } catch(e) { console.error(e); syncDot('err'); }
  saving = false;
}

function save() {
  clearTimeout(saveT);
  syncDot('sav');
  saveT = setTimeout(pushState, 500);
}

function subscribe() {
  sb.channel('hh12')
    .on('postgres_changes', { event:'*', schema:'public', table:'hee_hees_state', filter:`id=eq.${ROW_ID}` }, p => {
      if (p.new?.state && !saving) { S = p.new.state; render(); }
    })
    .subscribe();
}

function rLive() {
  const wn = editingWeek || S.currentWeek;
  const w  = wn ? gw(wn) : null;

  const banner = $('edit-banner');

    'Open (Jeff)':'OPN','Single Pin (Jeff)':'SP','Late':'LTE','Low Game':'LG',
    'Open':'OPN','Out of Uniform':'OOU','Single Pin Miss':'SP','Spill Beer':'SB',
    'Swept':'SWP','Talking Shit':'TS','Wrong Lane':'WL','XXXX':'XXXX',
    'Left-Side Gutter':'LG2','Under 500':'U5','Over 10 Pin Drop':'10P','Win Cards':'WC'

}

function ballVal(s) {
  s = (s||'').trim();
  if (s === 'X') return 10;
  if (s === '-') return 0;
  const n = parseInt(s); return isNaN(n) ? 0 : n;
}

function matchBowler(scoreName) {
  const sn = scoreName.toLowerCase().trim();
  // Exact
  let m = S.bowlers.find(b => b.name.toLowerCase() === sn); if (m) return m;
  // Last name
  const snLast = sn.split(' ').pop();
  m = S.bowlers.find(b => b.name.toLowerCase().split(' ').pop() === snLast); if (m) return m;
  // First name
  const snFirst = sn.split(' ')[0];
  return S.bowlers.find(b => b.name.toLowerCase().split(' ')[0] === snFirst) || null;
}

function parseScoreSheet(html) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const gameTables = doc.querySelectorAll('table.scoresheet');
  const games = [];

  gameTables.forEach(gt => {
    const game = {};
    gt.querySelectorAll('tr.notranslate').forEach(row => {
      const nameEl = row.querySelector('.cls_player'); if (!nameEl) return;
      const bowler = matchBowler(nameEl.textContent.trim()); if (!bowler) return;

      const frames = [];

      // Frames 1–9
      row.querySelectorAll('td.cls_frame').forEach(cell => {
        const b1 = cell.querySelector('.cls_ball1')?.textContent.trim() || '';
        const b2 = cell.querySelector('.cls_ball2')?.textContent.trim() || '';
        frames.push([b1, b2]);
      });

      // Frame 10 (first cls_frame10 has the balls10 table)
      const frame10cells = row.querySelectorAll('td.cls_frame10');
      let total = 0;
      frame10cells.forEach(cell => {
        if (cell.querySelector('.cls_tbl_balls10')) {
          const b1 = cell.querySelector('.cls_ball1')?.textContent.trim() || '';
          const b2 = cell.querySelector('.cls_ball2')?.textContent.trim() || '';
          const b3 = cell.querySelector('.cls_ball3')?.textContent.trim() || '';
          frames.push([b1, b2, b3]);
        }
        const tot = cell.querySelector('.cls_scoretotal');
        if (tot) total = parseInt(tot.textContent.trim()) || 0;
      });

      game[bowler.id] = { frames, total };
    });
    games.push(game);
  });

  return games; // Array of 3 game objects
}

function calcVerifyHangings(games, participating) {
  const h = {}; participating.forEach(bid => h[bid] = 0);
  let pendingAll4 = false;

  for (let g = 0; g < 3; g++) {
    for (let f = 0; f < 10; f++) {
      const b1s = {};
      participating.forEach(bid => { b1s[bid] = (games[g]?.[bid]?.frames?.[f]?.[0] || '').trim(); });
      const strikers = new Set(participating.filter(bid => b1s[bid] === 'X'));

      // Pending all-4 from previous frame
      if (pendingAll4) {
        let lowest = 11;
        participating.forEach(bid => { const v = ballVal(b1s[bid]); if (v < lowest) lowest = v; });
        participating.forEach(bid => { if (ballVal(b1s[bid]) === lowest) h[bid]++; });
        pendingAll4 = false;
      }

      // Solo non-striker
      if (strikers.size === 3) {
        const ns = participating.find(bid => !strikers.has(bid));
        if (ns) h[ns]++;
      }

      // All-4 → set up next frame
      if (strikers.size === 4) {
        if (f < 9) { pendingAll4 = true; }
        else if (g < 2) { pendingAll4 = true; } // carry to next game
        // Game 3 frame 10: skip
      }
    }
  }
  return h;
}

function calcVerifyXXXX(games, participating) {
  const x = {}; participating.forEach(bid => x[bid] = 0);

  for (let g = 0; g < 3; g++) {
    participating.forEach(bid => {
      const seq = [];
      for (let f = 0; f < 9; f++) seq.push((games[g]?.[bid]?.frames?.[f]?.[0] || '').trim() === 'X');
      // Frame 10: up to 3 balls
      const f10 = games[g]?.[bid]?.frames?.[9] || [];
      seq.push((f10[0]||'').trim() === 'X');
      if ((f10[0]||'').trim() === 'X') seq.push((f10[1]||'').trim() === 'X');
      if ((f10[0]||'').trim() === 'X' && (f10[1]||'').trim() === 'X') seq.push((f10[2]||'').trim() === 'X');

      let consec = 0, instances = 0;
      seq.forEach(s => { if (s) { consec++; if (consec >= 4) instances++; } else consec = 0; });
      x[bid] += instances;
    });
  }
  return x;
}

async function fetchAndVerify() {
  const url = $('vurl').value.trim();
  if (!url) { alert('Paste a URL first.'); return; }

  const btn = $('verify-btn');
  const status = $('verify-status');
  btn.disabled = true; btn.textContent = 'Fetching…';
  status.textContent = 'Contacting score server…';
  $('verify-results').innerHTML = '';

  try {
    let html = null;

    // Try proxies in order — own Vercel function first, then public fallbacks
    const proxies = [
      async () => {
        const r = await fetch(`/api/proxy?url=${encodeURIComponent(url)}`);
        if (!r.ok) throw new Error();
        return await r.text();
      },
      async () => {
        const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
        if (!r.ok) throw new Error();
        const d = await r.json();
        return d.contents || null;
      },
      async () => {
        const r = await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`);
        if (!r.ok) throw new Error();
        return await r.text();
      },
    ];

    for (const tryProxy of proxies) {
      try { html = await tryProxy(); if (html) break; } catch(e) { /* try next */ }
    }

    if (!html) throw new Error('All proxies failed — check your network connection');

    status.textContent = 'Parsing scores…';
    const games = parseScoreSheet(html);

    if (!games.length) throw new Error('No score tables found — wrong URL?');

    const wn = editingWeek || S.currentWeek;
    const w  = wn ? gw(wn) : null;
    const participating = w?.participating || S.bowlers.map(b => b.id);
    const avgs = w?.avgs || Object.fromEntries(S.bowlers.map(b => [b.id, b.avg]));

    const calcH = calcVerifyHangings(games, participating);
    const calcX = calcVerifyXXXX(games, participating);

    // Game totals per bowler
    const gameTotals = {}; // bowlerId → [g1, g2, g3]
    participating.forEach(bid => {
      gameTotals[bid] = [0,1,2].map(g => games[g]?.[bid]?.total || 0);
    });

    // Flags
    const flags = {};
    participating.forEach(bid => {
      const tots = gameTotals[bid];
      const total3 = tots.reduce((a,b)=>a+b,0);
      const avg = avgs[bid] || 0;
      const highGame = tots.some(t => t >= avg + 50);
      const lowGame  = tots.some(t => t > 0 && t <= avg - 50);
      const under500 = total3 > 0 && total3 < 500;
      // Swept: lowest score in all 3 games
      const swept = [0,1,2].every(g => {
        const myScore = games[g]?.[bid]?.total || 0;
        if (!myScore) return false;
        return participating.every(oid => (games[g]?.[oid]?.total || 0) >= myScore);
      });
      flags[bid] = { highGame, lowGame, under500, swept };
    });

    // Logged values
    const logH = bid => w?.hangings?.[bid] || 0;
    const logX = bid => countInf(bid, 'xxxx', wn);

    // Render results
    let html2 = '';
    participating.forEach(bid => {
      const b = gb(bid); if (!b) return;
      const lh = logH(bid), ch = calcH[bid] || 0;
      const lx = logX(bid), cx = calcX[bid] || 0;
      const fl = flags[bid];
      const fTags = [
        fl.highGame ? `<span class="flg">HIGH GAME</span>` : '',
        fl.lowGame  ? `<span class="flg">LOW GAME</span>`  : '',
        fl.under500 ? `<span class="flg">UNDER 500</span>` : '',
        fl.swept    ? `<span class="flg">SWEPT</span>`     : '',
      ].filter(Boolean);
      const tots = gameTotals[bid];

      html2 += `<div class="card" style="border-left:4px solid ${b.color};margin-bottom:10px">
        <div class="ch" style="gap:8px">
          <span class="dot" style="background:${b.color}"></span>
          <span style="flex:1">${b.name}</span>
          <span class="sm">${tots[0]} / ${tots[1]} / ${tots[2]} = ${tots.reduce((a,c)=>a+c,0)}</span>
        </div>
        <div class="cb" style="display:flex;flex-direction:column;gap:8px">
          <div style="display:flex;gap:12px;align-items:center">
            <span style="flex:1;font-weight:600">🪝 Hangings</span>
            <span class="${lh===ch?'ok':'bad'}" style="font-size:1rem;font-weight:700">Logged ${lh} / Calc ${ch}</span>
          </div>
          <div style="display:flex;gap:12px;align-items:center">
            <span style="flex:1;font-weight:600">✖️ XXXX</span>
            <span class="${lx===cx?'ok':'bad'}" style="font-size:1rem;font-weight:700">Logged ${lx} / Calc ${cx}</span>
          </div>
          ${fTags.length ? `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px">${fTags.join('')}</div>` : ''}
        </div>
      </div>`;
    });

    $('verify-results').innerHTML = html2;
    status.textContent = `✓ Verified ${games.length} games`;
  } catch(e) {
    status.textContent = `Error: ${e.message}`;
    console.error(e);
  } finally {
    btn.disabled = false; btn.textContent = 'Fetch & Verify';
  }
}

function countInf(bid, iid, wn) {
  const w = gw(wn); if (!w) return 0;
  let n=0;
  for(let g=0;g<3;g++) { const bg=w.games?.[g]?.[bid]; if(!bg)continue; for(let f=0;f<10;f++) n+=(bg.frames?.[f]||[]).filter(x=>x===iid).length; }
  return n;
}

// ── Admin ─────────────────────────────────────────────────────────────────────
function saveAdmin() {
  S.season = $('adm-season').value.trim() || S.season;
  document.querySelectorAll('[data-bid]').forEach(inp => { const b=gb(inp.dataset.bid); if(b) b.avg=parseFloat(inp.value)||b.avg; });
  document.querySelectorAll('[data-iid]').forEach(inp => { const i=gi(inp.dataset.iid); if(i) i.fee=parseFloat(inp.value)||i.fee; });
  save(); render(); alert('Saved!');
}

function resetSeason() {
  if (!confirm('Reset ALL season data? This cannot be undone.')) return;
  S = JSON.parse(JSON.stringify(DEFAULTS));
  save(); render(); alert('Reset complete.');
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadState().then(()=>subscribe());
</script>
